name: Build repository index

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Build split file index
        shell: bash
        run: |
          rm -f REPO_INDEX.txt
          rm -rf REPO_INDEX
          mkdir -p REPO_INDEX

          find . -type f \
            ! -path './.git/*' \
            ! -path './REPO_INDEX/*' \
            ! -path './CONFIG_AUDIT_INDEX/*' \
            ! -path './REPO_INDEX.txt' \
            | sed 's#^./##' \
            | sort > /tmp/all_files.txt

          {
            echo "Repository: $GITHUB_REPOSITORY"
            echo "Branch: ${GITHUB_REF_NAME}"
            echo "Commit: ${GITHUB_SHA}"
            echo "Generated at: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "Total files: $(wc -l < /tmp/all_files.txt)"
            echo
            echo "== Top-level directories =="
            find . -mindepth 1 -maxdepth 1 -type d \
              ! -path './.git' \
              ! -path './REPO_INDEX' \
              ! -path './CONFIG_AUDIT_INDEX' \
              | sed 's#^./##' \
              | sort
            echo
            echo "== Top-level file counts =="
            awk -F/ '{print $1}' /tmp/all_files.txt | sort | uniq -c | sort -nr
            echo
            echo "== Index chunks =="
          } > REPO_INDEX/SUMMARY.txt

          split -d -a 4 -l 3000 /tmp/all_files.txt REPO_INDEX/files_
          for file in REPO_INDEX/files_*; do
            mv "$file" "$file.txt"
          done

          for file in REPO_INDEX/files_*.txt; do
            echo "$(basename "$file") $(wc -l < "$file") lines" >> REPO_INDEX/SUMMARY.txt
          done

      - name: Build configuration audit index
        shell: bash
        run: |
          rm -rf CONFIG_AUDIT_INDEX
          mkdir -p CONFIG_AUDIT_INDEX
          python3 - <<'PY'
          from pathlib import Path
          from collections import Counter, defaultdict
          import csv
          import re

          root = Path('.')
          out = Path('CONFIG_AUDIT_INDEX')
          out.mkdir(exist_ok=True)

          top_type_names = {
              'AccountingRegisters': 'РегистрБухгалтерии',
              'AccumulationRegisters': 'РегистрНакопления',
              'BusinessProcesses': 'БизнесПроцесс',
              'Catalogs': 'Справочник',
              'ChartsOfAccounts': 'ПланСчетов',
              'ChartsOfCalculationTypes': 'ПланВидовРасчета',
              'ChartsOfCharacteristicTypes': 'ПланВидовХарактеристик',
              'CommonAttributes': 'ОбщийРеквизит',
              'CommonCommands': 'ОбщаяКоманда',
              'CommonForms': 'ОбщаяФорма',
              'CommonModules': 'ОбщийМодуль',
              'CommonPictures': 'ОбщаяКартинка',
              'CommonTemplates': 'ОбщийМакет',
              'Constants': 'Константа',
              'DataProcessors': 'Обработка',
              'DefinedTypes': 'ОпределяемыйТип',
              'DocumentJournals': 'ЖурналДокументов',
              'DocumentNumerators': 'НумераторДокументов',
              'Documents': 'Документ',
              'Enums': 'Перечисление',
              'EventSubscriptions': 'ПодпискаНаСобытие',
              'ExchangePlans': 'ПланОбмена',
              'FilterCriteria': 'КритерийОтбора',
              'FunctionalOptions': 'ФункциональнаяОпция',
              'FunctionalOptionsParameters': 'ПараметрФункциональнойОпции',
              'HTTPServices': 'HTTPСервис',
              'InformationRegisters': 'РегистрСведений',
              'IntegrationServices': 'ИнтеграционныйСервис',
              'Reports': 'Отчет',
              'Roles': 'Роль',
              'ScheduledJobs': 'РегламентноеЗадание',
              'Sequences': 'Последовательность',
              'SessionParameters': 'ПараметрСеанса',
              'SettingsStorages': 'ХранилищеНастроек',
              'Subsystems': 'Подсистема',
              'Tasks': 'Задача',
              'WebServices': 'WebСервис',
              'WSReferences': 'WSСсылка',
              'XDTOPackages': 'ПакетXDTO',
          }

          def write_tsv(path, rows, header):
              with path.open('w', encoding='utf-8', newline='') as f:
                  w = csv.writer(f, delimiter='\t')
                  w.writerow(header)
                  w.writerows(rows)

          def split_tsv(base_name, rows, header, chunk_size=5000):
              if not rows:
                  write_tsv(out / f'{base_name}_0000.tsv', rows, header)
                  return [f'{base_name}_0000.tsv']
              names = []
              for i in range(0, len(rows), chunk_size):
                  name = f'{base_name}_{i//chunk_size:04d}.tsv'
                  write_tsv(out / name, rows[i:i+chunk_size], header)
                  names.append(name)
              return names

          objects = []
          object_counts = Counter()
          for top, ru_type in top_type_names.items():
              top_path = root / top
              if not top_path.exists():
                  continue
              for xml in sorted(top_path.glob('*.xml')):
                  name = xml.stem
                  obj_dir = top_path / name
                  forms_count = len(list((obj_dir / 'Forms').glob('*.xml'))) if (obj_dir / 'Forms').exists() else 0
                  commands_count = len(list((obj_dir / 'Commands').glob('*'))) if (obj_dir / 'Commands').exists() else 0
                  has_manager = (obj_dir / 'Ext' / 'ManagerModule.bsl').exists()
                  has_object = (obj_dir / 'Ext' / 'ObjectModule.bsl').exists()
                  has_recordset = (obj_dir / 'Ext' / 'RecordSetModule.bsl').exists()
                  has_module = (obj_dir / 'Ext' / 'Module.bsl').exists()
                  objects.append([top, ru_type, name, str(xml), str(obj_dir) if obj_dir.exists() else '', forms_count, commands_count, int(has_manager), int(has_object), int(has_recordset), int(has_module)])
                  object_counts[ru_type] += 1

          write_tsv(out / 'metadata_objects.tsv', objects, ['top_folder','type','name','xml_path','object_dir','forms_count','commands_count','has_manager_module','has_object_module','has_recordset_module','has_module'])
          write_tsv(out / 'metadata_object_counts.tsv', [[k, v] for k, v in object_counts.most_common()], ['type','count'])

          def source_from_path(path: Path):
              parts = path.parts
              if not parts:
                  return ('', '', '')
              top = parts[0]
              if top in top_type_names and len(parts) >= 2:
                  return (top, top_type_names[top], parts[1])
              return (top, top, '')

          bsl_paths = sorted(p for p in root.rglob('*.bsl') if '.git' not in p.parts and 'CONFIG_AUDIT_INDEX' not in p.parts and 'REPO_INDEX' not in p.parts)
          module_rows = []
          ref_edges = set()
          move_edges = set()
          query_tables = set()
          query_sources = Counter()

          ns_pattern = re.compile(r'(?<![A-Za-zА-Яа-яЁё0-9_])(Справочники|Документы|РегистрыСведений|РегистрыНакопления|РегистрыБухгалтерии|ПланыСчетов|ПланыВидовХарактеристик|ПланыВидовРасчета|Перечисления|Отчеты|Обработки|БизнесПроцессы|Задачи|Константы|ОбщиеФормы|ОбщиеКоманды|ОбщиеМакеты|HTTPСервисы|WebСервисы)\.([A-Za-zА-Яа-яЁё0-9_]+)')
          move_pattern = re.compile(r'(?<![A-Za-zА-Яа-яЁё0-9_])Движения\.([A-Za-zА-Яа-яЁё0-9_]+)')
          table_pattern = re.compile(r'(?i)(?:\bИЗ\b|\bJOIN\b|\bСОЕДИНЕНИЕ\b)\s+([A-Za-zА-Яа-яЁё0-9_]+\.[A-Za-zА-Яа-яЁё0-9_]+(?:\.[A-Za-zА-Яа-яЁё0-9_]+)?)')

          for p in bsl_paths:
              rel = str(p)
              try:
                  text = p.read_text(encoding='utf-8-sig', errors='ignore')
              except Exception:
                  text = ''
              lines = text.count('\n') + (1 if text else 0)
              size = p.stat().st_size
              top, src_type, src_name = source_from_path(p)
              module_rows.append([rel, top, src_type, src_name, lines, size])
              for m in ns_pattern.finditer(text):
                  ref_edges.add((top, src_type, src_name, rel, m.group(1), m.group(2)))
              for m in move_pattern.finditer(text):
                  move_edges.add((top, src_type, src_name, rel, 'Движения', m.group(1)))
              if 'ВЫБРАТЬ' in text or 'SELECT' in text.upper():
                  query_sources[(top, src_type, src_name, rel)] += 1
                  for m in table_pattern.finditer(text):
                      query_tables.add((top, src_type, src_name, rel, m.group(1)))

          write_tsv(out / 'bsl_modules.tsv', module_rows, ['path','top_folder','source_type','source_name','lines','bytes'])
          ref_rows = sorted(ref_edges)
          move_rows = sorted(move_edges)
          query_rows = sorted(query_tables)
          ref_chunks = split_tsv('references', ref_rows, ['source_top_folder','source_type','source_name','source_path','ref_kind','ref_name'])
          move_chunks = split_tsv('movements', move_rows, ['source_top_folder','source_type','source_name','source_path','ref_kind','register_name'])
          query_chunks = split_tsv('query_tables', query_rows, ['source_top_folder','source_type','source_name','source_path','query_table'])

          ref_by_kind = Counter(row[4] for row in ref_rows)
          ref_by_name = Counter((row[4], row[5]) for row in ref_rows)
          move_by_name = Counter(row[5] for row in move_rows)
          query_by_table = Counter(row[4] for row in query_rows)

          with (out / 'SUMMARY.md').open('w', encoding='utf-8') as f:
              f.write(f'# Configuration audit index\n\n')
              f.write(f'Repository: {"${GITHUB_REPOSITORY}"}\n')
              f.write(f'Commit: {"${GITHUB_SHA}"}\n\n')
              f.write(f'## Metadata objects\n\n')
              f.write(f'Total metadata objects: {len(objects)}\n\n')
              for k, v in object_counts.most_common():
                  f.write(f'- {k}: {v}\n')
              f.write(f'\n## BSL modules\n\nTotal BSL modules: {len(module_rows)}\n\n')
              f.write(f'## Extracted links\n\n')
              f.write(f'- Namespace references: {len(ref_rows)}\n')
              f.write(f'- Movement references: {len(move_rows)}\n')
              f.write(f'- Query table references: {len(query_rows)}\n\n')
              f.write('### References by kind\n\n')
              for k, v in ref_by_kind.most_common():
                  f.write(f'- {k}: {v}\n')
              f.write('\n### Top movement registers\n\n')
              for k, v in move_by_name.most_common(50):
                  f.write(f'- {k}: {v}\n')
              f.write('\n### Top query tables\n\n')
              for k, v in query_by_table.most_common(80):
                  f.write(f'- {k}: {v}\n')
              f.write('\n## Files\n\n')
              f.write('- metadata_objects.tsv\n')
              f.write('- metadata_object_counts.tsv\n')
              f.write('- bsl_modules.tsv\n')
              for name in ref_chunks:
                  f.write(f'- {name}\n')
              for name in move_chunks:
                  f.write(f'- {name}\n')
              for name in query_chunks:
                  f.write(f'- {name}\n')
          PY

      - name: Commit indexes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add REPO_INDEX REPO_INDEX.txt CONFIG_AUDIT_INDEX
          if git diff --cached --quiet; then
            echo "Repository indexes are already up to date"
          else
            git commit -m "Обновить индексы репозитория для анализа"
            git push
          fi
